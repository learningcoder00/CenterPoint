<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nuScenes Clip Preview</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --panel-alt: #1d233b;
      --border: #2d3658;
      --text: #eef2ff;
      --muted: #a8b1d1;
      --accent: #7dd3fc;
      --accent-2: #c084fc;
      --success: #86efac;
      --danger: #fca5a5;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background:
        radial-gradient(circle at top left,  rgba(125,211,252,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(192,132,252,.14), transparent 24%),
        linear-gradient(180deg, #0b0e18, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .page { width: min(1500px, calc(100vw - 32px)); margin: 0 auto; padding: 24px 0 48px; }

    /* ── nav ── */
    .nav { display:flex; gap:8px; margin-bottom:20px; padding:6px; border:1px solid var(--border); border-radius:14px; background:rgba(23,27,46,.9); width:fit-content; }
    .nav a { padding:8px 20px; border-radius:10px; text-decoration:none; color:var(--muted); font-size:14px; font-weight:600; transition:background .15s, color .15s; }
    .nav a.active { background:rgba(125,211,252,.18); color:var(--accent); }
    .nav a:hover:not(.active) { background:rgba(255,255,255,.06); color:var(--text); }

    /* ── hero ── */
    .hero { display:flex; justify-content:space-between; gap:16px; padding:24px; border:1px solid var(--border); border-radius:20px; background:linear-gradient(180deg,rgba(29,35,59,.95),rgba(18,22,37,.95)); box-shadow:var(--shadow); margin-bottom:20px; }
    .hero h1 { margin:0 0 8px; font-size:28px; }
    .hero p  { margin:0; color:var(--muted); line-height:1.6; max-width:760px; font-size:14px; }
    .stats { display:flex; gap:12px; flex-wrap:wrap; }
    .stat { min-width:110px; padding:12px 14px; border:1px solid var(--border); border-radius:14px; background:rgba(23,27,46,.92); }
    .stat .label { display:block; color:var(--muted); font-size:11px; margin-bottom:6px; text-transform:uppercase; letter-spacing:.08em; }
    .stat .value { font-size:20px; font-weight:700; }

    /* ── controls ── */
    .controls { display:flex; gap:12px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
    .search-box { flex:1; min-width:220px; display:flex; gap:10px; align-items:center; padding:12px 16px; border:1px solid var(--border); border-radius:14px; background:rgba(23,27,46,.92); box-shadow:var(--shadow); }
    .search-box input { flex:1; border:0; outline:0; background:transparent; color:var(--text); font-size:14px; }
    .search-box span { color:var(--muted); font-size:13px; white-space:nowrap; }

    /* ── selection bar ── */
    .sel-bar { display:none; position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:500; gap:14px; align-items:center; padding:14px 24px; border:1px solid rgba(125,211,252,.4); border-radius:18px; background:rgba(15,18,32,.97); backdrop-filter:blur(8px); box-shadow:0 8px 40px rgba(0,0,0,.5); white-space:nowrap; }
    .sel-bar.visible { display:flex; }
    .sel-bar .count { font-size:15px; font-weight:700; color:var(--accent); }
    .sel-bar .btn { padding:9px 18px; border-radius:10px; border:0; cursor:pointer; font-size:13px; font-weight:700; }
    .sel-bar .btn-vis { background:var(--accent); color:#0a0d16; }
    .sel-bar .btn-vis:hover { background:#bae6fd; }
    .sel-bar .btn-clear { background:rgba(255,255,255,.08); color:var(--muted); }
    .sel-bar .btn-clear:hover { background:rgba(255,255,255,.14); color:var(--text); }

    /* ── grid ── */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px; }
    .card { position:relative; border:2px solid var(--border); border-radius:18px; background:linear-gradient(180deg,rgba(23,27,46,.97),rgba(17,20,33,.97)); box-shadow:var(--shadow); transition:transform .18s, border-color .18s; overflow:hidden; }
    .card:hover { transform:translateY(-3px); border-color:rgba(125,211,252,.45); }
    .card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(125,211,252,.3), var(--shadow); }

    /* checkbox overlay */
    .card-check-wrap { position:absolute; top:10px; left:10px; z-index:10; }
    .card-check-wrap input[type=checkbox] { width:20px; height:20px; accent-color:var(--accent); cursor:pointer; }

    .preview { aspect-ratio:16/9; width:100%; object-fit:cover; display:block; background:#0a0d16; cursor:pointer; }
    .card-body { padding:14px; cursor:pointer; }
    .card-header { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .card-title { margin:0; font-size:16px; }
    .badge { padding:4px 8px; border-radius:999px; background:rgba(125,211,252,.16); color:var(--accent); font-size:11px; font-weight:700; white-space:nowrap; }
    .meta { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .meta-item { padding:9px 11px; border-radius:10px; background:var(--panel-alt); }
    .meta-item .label { display:block; color:var(--muted); font-size:10px; margin-bottom:4px; text-transform:uppercase; letter-spacing:.08em; }
    .meta-item .value { font-size:14px; font-weight:600; word-break:break-all; }
    .card-footer { padding:0 14px 12px; }
    .card-tags-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .tag-list { display:flex; flex-wrap:wrap; gap:5px; min-height:22px; margin-top:5px; }
    .tag-chip { display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; background:rgba(125,211,252,.12); color:var(--accent); border:1px solid rgba(125,211,252,.3); transition:background .15s, box-shadow .15s; }
    .tag-chip.tag-hit { background:rgba(192,132,252,.28); color:var(--accent-2); border-color:rgba(192,132,252,.6); box-shadow:0 0 6px rgba(192,132,252,.4); }
    .tag-list.empty::after { content:"—"; color:var(--muted); font-size:11px; }

    /* ── hover playback indicator ── */
    .hover-indicator { position:absolute; bottom:8px; right:10px; z-index:9; display:none; align-items:center; gap:5px; padding:3px 8px; border-radius:999px; background:rgba(10,13,22,.75); backdrop-filter:blur(4px); border:1px solid rgba(125,211,252,.25); font-size:11px; color:var(--accent); pointer-events:none; }
    .hover-indicator.visible { display:flex; }
    .hover-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink .6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── modal (preview) ── */
    .modal-backdrop { position:fixed; inset:0; background:rgba(5,8,18,.75); backdrop-filter:blur(6px); z-index:1000; display:none; align-items:center; justify-content:center; padding:24px; }
    .modal-backdrop.open { display:flex; }
    .modal-panel { width:min(1100px,100%); max-height:calc(100vh - 48px); overflow:hidden; display:grid; grid-template-columns:1.2fr 1fr; border-radius:20px; border:1px solid var(--border); background:var(--panel); box-shadow:var(--shadow); }
    .modal-preview-col { display:flex; flex-direction:column; background:#0a0d16; min-height:0; }
    .modal-preview-img { width:100%; flex:1; min-height:280px; object-fit:contain; background:#000; }
    .modal-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 14px; border-top:1px solid var(--border); background:rgba(15,18,32,.95); }
    .modal-toolbar .title { font-size:13px; font-weight:700; margin:0; }
    .modal-toolbar .meta-line { font-size:12px; color:var(--muted); }
    .modal-btn { border:1px solid var(--border); border-radius:9px; background:rgba(125,211,252,.12); color:var(--accent); padding:7px 13px; cursor:pointer; font-size:12px; font-weight:600; }
    .modal-btn.secondary { background:transparent; color:var(--text); }
    .modal-side { display:flex; flex-direction:column; padding:18px; gap:12px; overflow-y:auto; border-left:1px solid var(--border); }
    .modal-side h3 { margin:0; font-size:15px; }
    .modal-side .hint { margin:0; font-size:11px; color:var(--muted); line-height:1.5; }
    .modal-tags-input { width:100%; min-height:130px; resize:vertical; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--panel-alt); color:var(--text); font-family:inherit; font-size:12px; }
    .modal-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .modal-status { font-size:11px; color:var(--muted); min-height:16px; }
    .modal-status.error { color:var(--danger); }
    .modal-status.ok    { color:var(--success); }

    /* ── submit modal ── */
    .submit-modal-panel { width:min(540px,100%); border-radius:20px; border:1px solid var(--border); background:var(--panel); padding:28px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:16px; }
    .submit-modal-panel h2 { margin:0; font-size:20px; }
    .submit-modal-panel .hint { margin:0; color:var(--muted); font-size:13px; line-height:1.6; }
    .field label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:6px; }
    .field input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--panel-alt); color:var(--text); font-size:13px; }
    .field input:focus { outline:none; border-color:var(--accent); }
    .submit-actions { display:flex; gap:10px; justify-content:flex-end; }
    .btn-primary { padding:10px 22px; border:0; border-radius:11px; background:var(--accent); color:#0a0d16; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-primary:hover { background:#bae6fd; }
    .btn-secondary { padding:10px 22px; border:1px solid var(--border); border-radius:11px; background:transparent; color:var(--text); font-size:14px; cursor:pointer; }
    .chip-list { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; background:rgba(125,211,252,.14); color:var(--accent); border:1px solid rgba(125,211,252,.3); }

    .empty, .loading { padding:32px; border:1px dashed var(--border); border-radius:18px; text-align:center; color:var(--muted); background:rgba(23,27,46,.72); }

    @media (max-width:900px) {
      .modal-panel { grid-template-columns:1fr; max-height:none; overflow-y:auto; }
      .modal-side { border-left:none; border-top:1px solid var(--border); }
      .hero, .controls { flex-direction:column; }
    }
  </style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a href="clips.html" class="active">Clips</a>
    <a href="results.html">Results</a>
  </nav>

  <section class="hero">
    <div>
      <h1>nuScenes Clip Preview</h1>
      <p>多选卡片后点击底部「开始可视化」提交任务；单击卡片预览帧序列并编辑 tags。</p>
    </div>
    <div class="stats">
      <div class="stat"><span class="label">Clips</span><span class="value" id="statClips">—</span></div>
      <div class="stat"><span class="label">Frames</span><span class="value" id="statFrames">—</span></div>
      <div class="stat"><span class="label">FPS</span><span class="value" id="statFps">3</span></div>
    </div>
  </section>

  <section class="controls">
    <div class="search-box">
      <span>🔍</span>
      <input id="searchInput" type="text" placeholder="模糊搜索 clip id、token 或 tag…">
      <span id="searchHint" style="font-size:11px;color:var(--muted);white-space:nowrap;display:none;"></span>
    </div>
    <button class="btn-secondary" id="btnSelectAll" style="padding:10px 16px;border-radius:12px;font-size:13px;cursor:pointer;">全选当前页</button>
    <button class="btn-secondary" id="btnClearAll" style="padding:10px 16px;border-radius:12px;font-size:13px;cursor:pointer;">取消选择</button>
  </section>

  <div id="content" class="loading">Loading clips…</div>
</div>

<!-- Selection bar -->
<div class="sel-bar" id="selBar">
  <span class="count" id="selCount">0 个已选</span>
  <button class="btn btn-vis" id="btnVisualize">开始可视化</button>
  <button class="btn btn-clear" id="btnClearSel">取消选择</button>
</div>

<!-- Preview modal -->
<div class="modal-backdrop" id="clipModal" role="dialog" aria-modal="true">
  <div class="modal-panel">
    <div class="modal-preview-col">
      <img id="modalPreviewImg" class="modal-preview-img" src="" alt="preview">
      <div class="modal-toolbar">
        <div>
          <p class="title" id="modalClipTitle"></p>
          <p class="meta-line" id="modalClipMeta"></p>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="modal-btn" id="modalPlayPause">暂停</button>
          <button class="modal-btn secondary" id="modalCloseBtn">关闭</button>
        </div>
      </div>
    </div>
    <div class="modal-side">
      <h3>Tags</h3>
      <p class="hint">每行一个 tag，保存后即时同步到后端。</p>
      <textarea class="modal-tags-input" id="modalTagsInput" placeholder="scenic&#10;complex&#10;highway"></textarea>
      <div class="modal-actions">
        <button class="btn-primary" id="modalSaveTags" style="font-size:13px;padding:8px 18px;">保存 tags</button>
      </div>
      <p class="modal-status" id="modalStatus"></p>
    </div>
  </div>
</div>

<!-- Submit visualization modal -->
<div class="modal-backdrop" id="submitModal" role="dialog" aria-modal="true">
  <div class="submit-modal-panel">
    <h2>提交可视化任务</h2>
    <p class="hint">将对选中的 clip 执行推理并生成 MP4 视频，任务完成后可在 Results 页面查看。</p>
    <div id="submitClipList" class="chip-list"></div>
    <!-- server defaults info -->
    <div id="serverConfigInfo" style="padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.7;border:1px solid var(--border);background:var(--panel-alt);"></div>
    <div class="field">
      <label>Config 路径 <span id="configRequired" style="color:var(--danger);display:none;">（必填，服务器未配置默认值）</span><span id="configOptional" style="color:var(--success);display:none;">（可选，留空使用服务器默认）</span></label>
      <input id="inputConfig" type="text" placeholder="configs/nusc/voxelnet/nusc_centerpoint_voxelnet_0075voxel_fix_bn_z.py">
    </div>
    <div class="field">
      <label>Checkpoint 路径 <span id="ckptRequired" style="color:var(--danger);display:none;">（必填，服务器未配置默认值）</span><span id="ckptOptional" style="color:var(--success);display:none;">（可选，留空使用服务器默认）</span></label>
      <input id="inputCheckpoint" type="text" placeholder="work_dirs/epoch_20.pth">
    </div>
    <p class="modal-status" id="submitStatus"></p>
    <div class="submit-actions">
      <button class="btn-secondary" id="submitCancelBtn">取消</button>
      <button class="btn-primary" id="submitConfirmBtn">提交</button>
    </div>
  </div>
</div>

<script>
  const API = "";  // same-origin
  const PLAY_INTERVAL_MS = 333;

  let allClips = [];
  let selectedIds = new Set();
  let modalClip = null;
  let modalIndex = 0;
  let modalTimer = null;
  let modalPlaying = false;
  let serverConfig = {};

  // hover playback
  const hoverFrameCache = new Map(); // clip_id -> frames[]
  let hoverTimer = null;
  let hoverCard = null;

  const content       = document.getElementById("content");
  const statClips     = document.getElementById("statClips");
  const statFrames    = document.getElementById("statFrames");
  const statFps       = document.getElementById("statFps");
  const searchInput   = document.getElementById("searchInput");
  const selBar        = document.getElementById("selBar");
  const selCount      = document.getElementById("selCount");
  const btnVisualize  = document.getElementById("btnVisualize");
  const btnClearSel   = document.getElementById("btnClearSel");
  const btnSelectAll  = document.getElementById("btnSelectAll");
  const btnClearAll   = document.getElementById("btnClearAll");
  const clipModal     = document.getElementById("clipModal");
  const submitModal   = document.getElementById("submitModal");

  // ── modal preview ─────────────────────────────────────────────────────────
  const modalPreviewImg = document.getElementById("modalPreviewImg");
  const modalClipTitle  = document.getElementById("modalClipTitle");
  const modalClipMeta   = document.getElementById("modalClipMeta");
  const modalPlayPause  = document.getElementById("modalPlayPause");
  const modalCloseBtn   = document.getElementById("modalCloseBtn");
  const modalTagsInput  = document.getElementById("modalTagsInput");
  const modalSaveTags   = document.getElementById("modalSaveTags");
  const modalStatus     = document.getElementById("modalStatus");

  // ── submit modal ──────────────────────────────────────────────────────────
  const submitClipList  = document.getElementById("submitClipList");
  const inputConfig     = document.getElementById("inputConfig");
  const inputCheckpoint = document.getElementById("inputCheckpoint");
  const submitStatus    = document.getElementById("submitStatus");
  const submitCancelBtn = document.getElementById("submitCancelBtn");
  const submitConfirmBtn= document.getElementById("submitConfirmBtn");

  // ── helpers ───────────────────────────────────────────────────────────────
  function resolveImgSrc(p) {
    if (!p) return "";
    // thumbnail_path is like ../data/nuscenes/... relative to clip_preview/
    // We serve /data/ from the server, so strip the leading ../
    if (p.startsWith("../")) return "/" + p.slice(3);
    return p;
  }

  function fmt(s) { return `${s.toFixed(1)}s`; }

  function stopPlayback() {
    if (modalTimer) { clearInterval(modalTimer); modalTimer = null; }
  }

  function setPlaying(flag) {
    modalPlaying = flag;
    modalPlayPause.textContent = flag ? "暂停" : "播放";
    stopPlayback();
    if (flag && modalClip && modalClip.frames && modalClip.frames.length > 1) {
      modalTimer = setInterval(() => {
        modalIndex = (modalIndex + 1) % modalClip.frames.length;
        modalPreviewImg.src = resolveImgSrc(modalClip.frames[modalIndex].image_path);
      }, PLAY_INTERVAL_MS);
    }
  }

  async function openPreviewModal(clip) {
    // fetch full clip (with frames) from API
    try {
      const r = await fetch(`${API}/api/clips/${clip.clip_id}`);
      modalClip = await r.json();
    } catch { modalClip = clip; }

    modalIndex = 0;
    modalStatus.textContent = "";
    modalStatus.className = "modal-status";
    modalClipTitle.textContent = modalClip.clip_id;
    modalClipMeta.textContent = `${modalClip.frame_count} frames · ${fmt(modalClip.duration_s)} · 3 FPS`;
    modalPreviewImg.src = resolveImgSrc(modalClip.frames ? modalClip.frames[0].image_path : modalClip.thumbnail_path);

    // load tags
    try {
      const tr = await fetch(`${API}/api/clips/${modalClip.clip_id}/tags`);
      const td = await tr.json();
      modalTagsInput.value = (td.tags || []).join("\n");
    } catch { modalTagsInput.value = ""; }

    clipModal.classList.add("open");
    document.body.style.overflow = "hidden";
    setPlaying(true);
  }

  function closePreviewModal() {
    stopPlayback();
    modalClip = null;
    clipModal.classList.remove("open");
    document.body.style.overflow = "";
  }

  modalCloseBtn.addEventListener("click", closePreviewModal);
  clipModal.addEventListener("click", e => { if (e.target === clipModal) closePreviewModal(); });
  modalPlayPause.addEventListener("click", e => { e.stopPropagation(); setPlaying(!modalPlaying); });

  modalSaveTags.addEventListener("click", async e => {
    e.stopPropagation();
    if (!modalClip) return;
    const tags = modalTagsInput.value.split("\n").map(t => t.trim()).filter(Boolean);
    modalStatus.textContent = "保存中…";
    modalStatus.className = "modal-status";
    try {
      const r = await fetch(`${API}/api/clips/${modalClip.clip_id}/tags`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tags }),
      });
      if (!r.ok) throw new Error(await r.text());
      modalStatus.textContent = "已保存。";
      modalStatus.className = "modal-status ok";
      refreshCardTags(modalClip.clip_id);
    } catch (err) {
      modalStatus.textContent = `保存失败: ${err.message}`;
      modalStatus.className = "modal-status error";
    }
  });

  window.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      if (clipModal.classList.contains("open")) closePreviewModal();
      if (submitModal.classList.contains("open")) submitModal.classList.remove("open");
    }
  });

  // ── selection ─────────────────────────────────────────────────────────────
  function updateSelBar() {
    if (selectedIds.size > 0) {
      selBar.classList.add("visible");
      selCount.textContent = `${selectedIds.size} 个已选`;
    } else {
      selBar.classList.remove("visible");
    }
    document.querySelectorAll(".card").forEach(c => {
      c.classList.toggle("selected", selectedIds.has(c.dataset.clipId));
      const cb = c.querySelector("input[type=checkbox]");
      if (cb) cb.checked = selectedIds.has(c.dataset.clipId);
    });
  }

  function toggleSelect(clipId) {
    if (selectedIds.has(clipId)) selectedIds.delete(clipId);
    else selectedIds.add(clipId);
    updateSelBar();
  }

  btnClearSel.addEventListener("click", () => { selectedIds.clear(); updateSelBar(); });
  btnClearAll.addEventListener("click", () => { selectedIds.clear(); updateSelBar(); });
  btnSelectAll.addEventListener("click", () => {
    const visible = document.querySelectorAll(".card");
    visible.forEach(c => selectedIds.add(c.dataset.clipId));
    updateSelBar();
  });

  btnVisualize.addEventListener("click", () => {
    if (selectedIds.size === 0) return;
    submitClipList.innerHTML = "";
    [...selectedIds].forEach(id => {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = id;
      submitClipList.appendChild(chip);
    });

    // pre-fill and show server defaults status
    const hasConfig = !!(serverConfig.config && serverConfig.config.trim());
    const hasCkpt   = !!(serverConfig.checkpoint && serverConfig.checkpoint.trim());

    const infoEl = document.getElementById("serverConfigInfo");
    infoEl.innerHTML = `
      <b style="color:var(--accent)">服务器当前默认值</b><br>
      Config:     <code style="color:${hasConfig ? "var(--success)" : "var(--danger)"}">${serverConfig.config || "未设置"}</code><br>
      Checkpoint: <code style="color:${hasCkpt   ? "var(--success)" : "var(--danger)"}">${serverConfig.checkpoint || "未设置"}</code>
      ${(!hasConfig || !hasCkpt) ? "<br><span style='color:var(--warning);font-size:11px;'>⚠ 服务器未配置默认值，请在下方输入框填写；或重启服务时加上 --config 和 --checkpoint 参数。</span>" : ""}
    `;

    inputConfig.value = serverConfig.config || "";
    inputCheckpoint.value = serverConfig.checkpoint || "";

    // show required / optional hints
    document.getElementById("configRequired").style.display = hasConfig ? "none" : "inline";
    document.getElementById("configOptional").style.display = hasConfig ? "inline" : "none";
    document.getElementById("ckptRequired").style.display   = hasCkpt   ? "none" : "inline";
    document.getElementById("ckptOptional").style.display   = hasCkpt   ? "inline" : "none";

    submitStatus.textContent = "";
    submitStatus.className = "modal-status";
    submitModal.classList.add("open");
    document.body.style.overflow = "hidden";
  });

  submitCancelBtn.addEventListener("click", () => {
    submitModal.classList.remove("open");
    document.body.style.overflow = "";
  });
  submitModal.addEventListener("click", e => {
    if (e.target === submitModal) { submitModal.classList.remove("open"); document.body.style.overflow = ""; }
  });

  submitConfirmBtn.addEventListener("click", async () => {
    const clip_ids = [...selectedIds];
    if (!clip_ids.length) return;

    // Client-side validation: config and checkpoint must be present either from server defaults or input
    const effectiveConfig = inputConfig.value.trim() || serverConfig.config || "";
    const effectiveCkpt   = inputCheckpoint.value.trim() || serverConfig.checkpoint || "";
    if (!effectiveConfig) {
      submitStatus.textContent = "请填写 Config 路径（服务器未配置默认值）";
      submitStatus.className = "modal-status error";
      inputConfig.focus();
      return;
    }
    if (!effectiveCkpt) {
      submitStatus.textContent = "请填写 Checkpoint 路径（服务器未配置默认值）";
      submitStatus.className = "modal-status error";
      inputCheckpoint.focus();
      return;
    }

    submitConfirmBtn.disabled = true;
    submitStatus.textContent = "提交中…";
    submitStatus.className = "modal-status";
    try {
      const body = { clip_ids };
      if (inputConfig.value.trim())      body.config     = inputConfig.value.trim();
      if (inputCheckpoint.value.trim())  body.checkpoint = inputCheckpoint.value.trim();

      const r = await fetch(`${API}/api/jobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || JSON.stringify(data));

      submitStatus.textContent = `已提交 ${data.jobs.length} 个任务。跳转到 Results 页面查看进度。`;
      submitStatus.className = "modal-status ok";
      selectedIds.clear();
      updateSelBar();
      setTimeout(() => {
        submitModal.classList.remove("open");
        document.body.style.overflow = "";
        window.location.href = "results.html";
      }, 1500);
    } catch (err) {
      submitStatus.textContent = `提交失败: ${err.message}`;
      submitStatus.className = "modal-status error";
    } finally {
      submitConfirmBtn.disabled = false;
    }
  });

  // ── tags ──────────────────────────────────────────────────────────────────
  async function refreshCardTags(clipId) {
    const card = document.querySelector(`.card[data-clip-id="${clipId}"]`);
    if (!card) return;
    const tagList = card.querySelector(".tag-list");
    if (!tagList) return;
    try {
      const r = await fetch(`${API}/api/clips/${clipId}/tags`);
      const d = await r.json();
      renderTagChips(tagList, d.tags || [], searchInput.value.trim());
    } catch { /* silent */ }
  }

  function renderTagChips(container, tags, highlightQuery) {
    container.innerHTML = "";
    container.classList.toggle("empty", !tags || tags.length === 0);
    (tags || []).forEach(t => {
      const s = document.createElement("span");
      const isHit = highlightQuery && fuzzyScore(t, highlightQuery) > 0;
      s.className = "tag-chip" + (isHit ? " tag-hit" : "");
      s.textContent = t;
      container.appendChild(s);
    });
  }

  // ── hover playback ─────────────────────────────────────────────────────────
  function stopHoverPlayback() {
    if (hoverTimer) { clearInterval(hoverTimer); hoverTimer = null; }
    hoverCard = null;
  }

  async function startHoverPlayback(card, clip, img, indicator, frameLabel) {
    if (hoverCard === card) return; // already playing this card
    stopHoverPlayback();
    hoverCard = card;

    // show loading state
    indicator.classList.add("visible");
    frameLabel.textContent = "…";

    let frames = hoverFrameCache.get(clip.clip_id);
    if (!frames) {
      try {
        const r = await fetch(`${API}/api/clips/${clip.clip_id}`);
        const d = await r.json();
        frames = d.frames || [];
        hoverFrameCache.set(clip.clip_id, frames);
      } catch {
        frames = [];
      }
    }

    // if mouse already left while fetching, abort
    if (hoverCard !== card) return;

    if (!frames.length) { indicator.classList.remove("visible"); return; }

    let idx = 0;
    frameLabel.textContent = `1/${frames.length}`;
    img.src = resolveImgSrc(frames[0].image_path);

    hoverTimer = setInterval(() => {
      idx = (idx + 1) % frames.length;
      img.src = resolveImgSrc(frames[idx].image_path);
      frameLabel.textContent = `${idx + 1}/${frames.length}`;
    }, PLAY_INTERVAL_MS);
  }

  // ── card rendering ────────────────────────────────────────────────────────
  function createCard(clip, highlightQuery) {
    const card = document.createElement("article");
    card.className = "card";
    card.dataset.clipId = clip.clip_id;

    // checkbox
    const checkWrap = document.createElement("div");
    checkWrap.className = "card-check-wrap";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = selectedIds.has(clip.clip_id);
    cb.addEventListener("change", e => { e.stopPropagation(); toggleSelect(clip.clip_id); });
    checkWrap.appendChild(cb);

    const img = document.createElement("img");
    img.className = "preview";
    img.loading = "lazy";
    img.alt = clip.clip_id;
    img.src = resolveImgSrc(clip.thumbnail_path);
    img.addEventListener("click", e => { e.stopPropagation(); openPreviewModal(clip); });

    // hover playback indicator
    const indicator = document.createElement("div");
    indicator.className = "hover-indicator";
    const dot = document.createElement("span");
    dot.className = "hover-dot";
    const frameLabel = document.createElement("span");
    indicator.appendChild(dot);
    indicator.appendChild(frameLabel);

    card.addEventListener("mouseenter", () => startHoverPlayback(card, clip, img, indicator, frameLabel));
    card.addEventListener("mouseleave", () => {
      stopHoverPlayback();
      indicator.classList.remove("visible");
      img.src = resolveImgSrc(clip.thumbnail_path);
    });

    const body = document.createElement("div");
    body.className = "card-body";
    body.addEventListener("click", () => openPreviewModal(clip));
    body.innerHTML = `
      <div class="card-header">
        <h2 class="card-title">${clip.clip_id}</h2>
        <span class="badge">${clip.frame_count} frames</span>
      </div>
      <div class="meta">
        <div class="meta-item"><span class="label">Duration</span><span class="value">${fmt(clip.duration_s)}</span></div>
        <div class="meta-item"><span class="label">Start Token</span><span class="value">${clip.start_token.slice(0,12)}</span></div>
      </div>`;

    const footer = document.createElement("div");
    footer.className = "card-footer";
    const tagLabel = document.createElement("span");
    tagLabel.className = "card-tags-label";
    tagLabel.textContent = "Tags";
    const tagList = document.createElement("div");
    tagList.className = "tag-list empty";
    renderTagChips(tagList, clip.tags || [], highlightQuery);
    footer.appendChild(tagLabel);
    footer.appendChild(tagList);

    card.appendChild(checkWrap);
    card.appendChild(img);
    card.appendChild(indicator);
    card.appendChild(body);
    card.appendChild(footer);
    return card;
  }

  function render(clips) {
    if (!clips.length) {
      content.className = "empty";
      content.textContent = "No clips match.";
      return;
    }
    content.className = "grid";
    content.innerHTML = "";
    const q = searchInput.value.trim();
    clips.forEach(c => content.appendChild(createCard(c, q)));
  }

  // 模糊匹配：检查 pattern 中的每个字符是否按顺序出现在 text 中，并返回匹配分数
  function fuzzyScore(text, pattern) {
    if (!pattern) return 1;
    text = text.toLowerCase();
    pattern = pattern.toLowerCase();
    // 精确包含优先级最高
    if (text.includes(pattern)) return 100 + (text === pattern ? 100 : 0);
    let score = 0, pi = 0, lastMatch = -1;
    for (let ti = 0; ti < text.length && pi < pattern.length; ti++) {
      if (text[ti] === pattern[pi]) {
        score += (ti === lastMatch + 1) ? 2 : 1; // 连续字符加分
        lastMatch = ti;
        pi++;
      }
    }
    return pi === pattern.length ? score : 0; // 未完全匹配返回 0
  }

  function filterClips(q) {
    const n = q.trim();
    const searchHint = document.getElementById("searchHint");
    if (!n) {
      searchHint.style.display = "none";
      return allClips;
    }

    const results = [];
    for (const c of allClips) {
      const idScore  = fuzzyScore(c.clip_id, n);
      const tokScore = fuzzyScore(c.start_token, n);
      const tagScore = (c.tags || []).reduce((best, t) => Math.max(best, fuzzyScore(t, n)), 0);
      const best = Math.max(idScore, tokScore, tagScore);
      if (best > 0) results.push({ clip: c, score: best, tagHit: tagScore > 0 && tagScore >= idScore && tagScore >= tokScore });
    }

    results.sort((a, b) => b.score - a.score);
    const matched = results.map(r => r.clip);

    searchHint.textContent = `找到 ${matched.length} 个结果`;
    searchHint.style.display = matched.length ? "inline" : "none";

    return matched;
  }

  searchInput.addEventListener("input", () => render(filterClips(searchInput.value)));

  // ── init ──────────────────────────────────────────────────────────────────
  async function load() {
    try {
      const [clipsResp, cfgResp] = await Promise.all([
        fetch(`${API}/api/clips`),
        fetch(`${API}/api/config`),
      ]);
      const data = await clipsResp.json();
      serverConfig = await cfgResp.json();

      allClips = data.clips || [];
      statClips.textContent  = allClips.length;
      statFrames.textContent = allClips.reduce((s, c) => s + c.frame_count, 0);
      render(allClips);
    } catch (err) {
      content.className = "empty";
      content.textContent = `加载失败: ${err.message}`;
    }
  }

  load();
</script>
</body>
